name: Deploy to GitHub Pages

on:
  # Build and deploy on every push to main.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions needed to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # Install the whole workspace from the root lockfile, then build ONLY the
      # public site (apps/web). The private metrics dashboard (apps/metrics) is
      # never built or uploaded here — it deploys separately to Cloudflare and
      # must never reach GitHub Pages. See adr/0002, adr/0003, adr/0005.
      - name: Install workspace dependencies
        run: npm ci
      - name: Build public site
        run: npm run build:web
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
